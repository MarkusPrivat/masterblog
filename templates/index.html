{% extends 'base.html' %}
{% block title %}Home{% endblock %}
{% block content %}
    {% for post in blog_posts %}
    <div class="post">
        <h2>{{ post['title'] }}</h2>
        <p class="meta">By {{ post['author'] }}</p>
        <p>{{ post['content'] }}</p>
        <div class="actions">
            <a href="/update/{{ post['id'] }}">Edit</a>
            <a href="/delete/{{ post['id'] }}" class="delete-link">Delete</a>
        </div>
    </div>
    {% endfor %}
{% endblock %}
