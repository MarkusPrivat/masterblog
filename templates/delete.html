<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Flask Blog - Delete Post</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>
        <h1>Delete Post</h1>
        <div class="post">
            <h2>{{ post['title'] }}</h2>
            <p><em>Written by {{ post['author'] }}</em></p>
            <p>{{ post['content'] }}</p>
        </div>
        <form method="POST" action="/delete/{{ post_id }}">
            <label for="delete">Enter 'DELETE' to delete this post: </label></br>
            <input type="text" id="delete" name="delete" required>
            <input type="submit" value="Submit">
        </form>
    </body>
</html>
