{% extends 'base.html' %}
{% block title %}Delete Post{% endblock %}
{% block content %}
    <h1>Delete Post</h1>
    <div class="post">
        <h2>{{ post['title'] }}</h2>
        <p class="meta">Written by {{ post['author'] }}</p>
        <p>{{ post['content'] }}</p>
    </div>

    <form method="POST" action="/delete/{{ post['id'] }}">
        <p>Are you sure? This action cannot be undone.</p>
        <label for="delete">Type <strong>DELETE</strong> to confirm:</label>
        <input type="text" id="delete" name="delete" required>
        <button type="submit" class="btn-delete">Confirm Delete</button>
    </form>
{% endblock %}
