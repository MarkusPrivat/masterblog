{% extends 'base.html' %}
{% block title %}Edit Post{% endblock %}
{% block content %}
    <h1>Edit Post</h1>
    <form method="POST" action="/update/{{ post_id }}">
        <label>Author</label>
        <input type="text" name="author" value="{{ post['author'] }}" required>
        
        <label>Title</label>
        <input type="text" name="title" value="{{ post['title'] }}" required>
        
        <label>Content</label>
        <textarea name="content" rows="8" required>{{ post['content'] }}</textarea>
        
        <button type="submit">Update Post</button>
    </form>
{% endblock %}
